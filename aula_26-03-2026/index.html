<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Calculadora de Abastecimento</h1>
    <p>Tabela de Preços:</p>
    <ul>
        <li>Gasolina: R$6,39</li>
        <li>Etanol: R$5,89</li>
    </ul>
    <form id="formularioAbastecimento">
        <label for="combustivel">Tipo combustivel</label>
            <select name="combustivel" id="combustivel">
                <option value="">Escolha uma opcao</option>
                <option value="gasolina">Gasolina</option>
                <option value="etanol">Etanol</option>
            </select>
            <label for="litros">Quantidade (litros):</label>
            <input type="number" id="litros" min="0" step="0.1">

    </form>
    <h2>Resultado</h2>
    <p id="resultado"></p>
    <script src="script.js"></script>
</body>
</html>
