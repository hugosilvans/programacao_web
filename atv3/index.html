<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Página Interativa js</h1>

    <h3>Contador de Cliques</h3>
    <button id="increment">Incrementar</button>
    <button id="decrement">Decrementar</button>
    <p id="resultado"></p>

    <hr>

    <h3>Texto dinâmico</h3>
    <label for="">Campo</label>
    <input type="text" placeholder="Digite aqui" id="input">
    <br>
    <p><span id="resultado1"></span></p>

    <hr> 

    <h3>Contador de caracteres</h3>
    <input type="text" placeholder="Digite aqui" id="carac">
    <br>
    <p><span id="resultado2"></span></p>

    <hr>

    <h3>Adicionar novo item</h3>
    
    <label for="opcoes">Escolha o tipo de lista:</label>
<select id="opcoes" name="opcoes">
  <option value="ul">Lista Não Ordenada</option>
  <option value="ol">Lista Ordenada</option>
</select>
    <input type="text" placeholder="Digite algo" id="campo">
    <button id="add">Adicionar Lista</button>
    <p><span id="resultado3"></span></p>
    <button id="reset">Resetar Tudo</button>

<script src="prompt.js"></script>

</body>
</html>
